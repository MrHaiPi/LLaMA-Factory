### model
model_name_or_path: /home/xiarui/.cache/modelscope/hub/models/Qwen/Qwen3-VL-2B-Instruct
image_max_pixels: 1048576 # 512 * 512 = 262144; 1024 * 1024 = 1048576
video_max_pixels: 16384
trust_remote_code: true 

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z0_config.json

### dataset
dataset_dir: /home/xiarui/projects/AIPhoto/Dataset/final_train
dataset: photo_sft_training_data_person,photo_sft_training_data_person2
template: qwen3_vl
cutoff_len: 2048 #2048
# max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3vl-2b/full/sft_20251029_bs2_lr1e-5_gas16
logging_steps: 2
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 20
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

